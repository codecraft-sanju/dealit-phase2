version: '3.8'

services:
  backend:
    build: ./Backend  # Yahan 'B' capital kar do kyunki tumhare folder ka naam 'Backend' hai
    ports:
      - "5000:5000"
    restart: always

  frontend:
    build: ./frontend # Isko 'frontend' hi rehne do agar folder small 'f' se hai
    ports:
      - "5173:80"     # YAHAN CHANGE KARNA HAI: Isko wapas 5173 kar do taaki port 80 Nginx ke liye free ho jaye
    depends_on:
      - backend
    restart: always